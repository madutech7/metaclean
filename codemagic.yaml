workflows:
  expo-ios-workflow:
    name: MetaClean iOS Build (Unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      vars:
        EXPO_APPLE_ID: "votre_email@gmail.com" # Optionnel pour build non-signé
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli
      - name: Prebuild iOS
        script: |
          export CI=true
          npx expo prebuild --platform ios --clean || exit 1
          echo "Prebuild finished. Listing ios directory:"
          ls -la ios/ || echo "WARNING: ios directory not found!"
      - name: Fix FFmpeg 404
        script: |
          echo "Patching node_modules podspecs to use ffmpeg-kit-ios-full..."
          find node_modules/ffmpeg-kit-react-native -name "*.podspec" -exec sed -i '' "s/ffmpeg-kit-ios-https/ffmpeg-kit-ios-full/g" {} +
          
          cd ios
          echo "Patching Podfile to use luthviar mirror..."
          # Replace any existing reference in Podfile
          sed -i '' "s/ffmpeg-kit-ios-https/ffmpeg-kit-ios-full/g" Podfile
          
          # Inject the working mirror at the top
          sed -i '' "1s/^/pod 'ffmpeg-kit-ios-full', :podspec => 'https:\/\/raw.githubusercontent.com\/luthviar\/ffmpeg-kit-ios-full\/main\/ffmpeg-kit-ios-full.podspec'\n/" Podfile
          
          echo "Current Podfile content (first 15 lines):"
          head -n 15 Podfile
      - name: Install CocoaPods
        script: |
          cd ios
          pod install || exit 1
      - name: Build iOS IPA (Unsigned)
        script: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n 1)
          
          if [ -z "$WORKSPACE" ] || [ ! -e "$WORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found in ios directory."
            exit 1
          fi
          
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "Detected Workspace: $WORKSPACE"
          echo "Detected Scheme: $SCHEME"
          
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive || exit 1
            
      - name: Export Unsigned IPA
        script: |
          mkdir -p $CM_EXPORT_DIR
          APP_PATH=$(find $CM_BUILD_DIR/build.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app in archive"
            exit 1
          fi
          
          echo "Found .app at: $APP_PATH"
          cp -R "$APP_PATH" $CM_EXPORT_DIR/
          cd $CM_EXPORT_DIR
          zip -r MetaClean.ipa $(basename "$APP_PATH")
    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - madutech0@gmail.com
