workflows:
  expo-ios-workflow:
    name: MetaClean iOS Build (Unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      vars:
        EXPO_APPLE_ID: "votre_email@gmail.com" # Optionnel pour build non-signé
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios
      - name: Build iOS IPA (Unsigned)
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | jq -r '.workspace.schemes[0]')
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/MetaClean.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
      - name: Export Unsigned IPA
        script: |
          mkdir -p $CM_EXPORT_DIR
          # Find the app bundle inside the archive dynamically
          APP_PATH=$(find $CM_BUILD_DIR/MetaClean.xcarchive -name "*.app" -type d | head -n 1)
          cp -R "$APP_PATH" $CM_EXPORT_DIR/
          cd $CM_EXPORT_DIR
          zip -r MetaClean.ipa $(basename "$APP_PATH")
    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - madutech0@gmail.com
