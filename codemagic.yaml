workflows:
  expo-ios-workflow:
    name: MetaClean iOS Build (Unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      vars:
        EXPO_APPLE_ID: "votre_email@gmail.com" # Optionnel pour build non-signé
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli
      - name: Prebuild iOS
        script: |
          export CI=true
          npx expo prebuild --platform ios --clean || exit 1
          echo "Prebuild finished. Listing ios directory:"
          ls -la ios/ || echo "WARNING: ios directory not found!"
      - name: Fix FFmpeg 404
        script: |
          cd ios
          echo "Generating local podspec for FFmpeg to bypass 404..."
          cat <<EOF > ffmpeg-kit-ios-https.podspec
          Pod::Spec.new do |s|
            s.name             = 'ffmpeg-kit-ios-https'
            s.version          = '6.0'
            s.summary          = 'Mirror of FFmpegKit for iOS'
            s.homepage         = 'https://github.com/luthviar/ffmpeg-kit-ios-full'
            s.license          = { :type => 'LGPL-3.0' }
            s.authors          = { 'Taner Sener' => 'tanersener@gmail.com' }
            s.platform             = :ios, '12.1'
            s.source               = { :http => 'https://github.com/luthviar/ffmpeg-kit-ios-full/releases/download/6.0/ffmpeg-kit-ios-full.zip' }
            s.vendored_frameworks = 'ffmpeg-kit-ios-full/*.xcframework'
          end
          EOF
          
          echo "Patching Podfile to use local podspec..."
          # Inject the pod line at the top of the Podfile
          sed -i '' "1s/^/pod 'ffmpeg-kit-ios-https', :path => 'ffmpeg-kit-ios-https.podspec'\n/" Podfile
          
          echo "Current Podfile content (first 10 lines):"
          head -n 10 Podfile
      - name: Install CocoaPods
        script: |
          cd ios
          pod install || exit 1
      - name: Build iOS IPA (Unsigned)
        script: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n 1)
          
          if [ -z "$WORKSPACE" ] || [ ! -e "$WORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found in ios directory."
            exit 1
          fi
          
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "Detected Workspace: $WORKSPACE"
          echo "Detected Scheme: $SCHEME"
          
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive || exit 1
            
      - name: Export Unsigned IPA
        script: |
          mkdir -p $CM_EXPORT_DIR
          APP_PATH=$(find $CM_BUILD_DIR/build.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app in archive"
            exit 1
          fi
          
          echo "Found .app at: $APP_PATH"
          cp -R "$APP_PATH" $CM_EXPORT_DIR/
          cd $CM_EXPORT_DIR
          zip -r MetaClean.ipa $(basename "$APP_PATH")
    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - madutech0@gmail.com
